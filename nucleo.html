```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NÚCLEO - Sistema Interno</title>

<style>

body{
background:black;
color:#00ff88;
font-family:monospace;
margin:0;
padding:0;
}

#boot{
padding:30px;
white-space:pre-line;
}

#terminal{
display:none;
padding:20px;
}

#terminal-output{
height:70vh;
overflow-y:auto;
border:1px solid #00ff88;
padding:15px;
margin-bottom:10px;
}

#cmd{
width:100%;
padding:10px;
background:black;
border:1px solid #00ff88;
color:#00ff88;
font-family:monospace;
}

#cmd:focus{
outline:none;
}

.title{
font-size:22px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div id="boot"></div>

<div id="terminal">

<div class="title">
SISTEMA NÚCLEO — TERMINAL CENTRAL
</div>

<div id="terminal-output"></div>

<input id="cmd" placeholder="Introduce comando...">

</div>

<script>

const boot = document.getElementById("boot")
const terminal = document.getElementById("terminal")
const cmd = document.getElementById("cmd")
const output = document.getElementById("terminal-output")

const bootLines = [

"Iniciando sistema NÚCLEO...",
"Verificando arquitectura...",
"Cargando módulos estratégicos...",
"Inicializando radar...",
"Verificando fases del proyecto...",
"",
"FASE 1 — Custodia ✔",
"FASE 2 — Dominio ✔",
"FASE 3 — Estrategia ✔",
"FASE 4 — Expansión ✔",
"FASE 5 — Consolidación ✔",
"FASE 6 — Arquitectura ✔",
"FASE 7 — Núcleo ✔",
"FASE 8 — Proyección ✔",
"FASE 9 — Ascenso ✔",
"",
"Conectando nodo central...",
"Acceso autorizado.",
"",
"Bienvenido al NÚCLEO."

]

let i = 0

function bootSequence(){

if(i < bootLines.length){

boot.innerHTML += bootLines[i] + "\n"

i++

setTimeout(bootSequence,500)

}

else{

setTimeout(()=>{

boot.style.display="none"
terminal.style.display="block"

startTerminal()

},800)

}

}

bootSequence()

function print(text){

let line=document.createElement("div")

line.innerText=text

output.appendChild(line)

output.scrollTop=output.scrollHeight

}

function startTerminal(){

print("Sistema listo.")
print("")
print("COMANDOS DISPONIBLES:")
print("1 - Estado del sistema")
print("2 - Ver fases")
print("3 - Radar del núcleo")
print("4 - Mapa estructural")
print("5 - Archivo del núcleo")
print("6 - Limpiar terminal")
print("7 - Salir")
print("")

}

cmd.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let command = cmd.value

print("> "+command)

if(command==="1"){

print("ESTADO DEL SISTEMA")
print("Nodo central: activo")
print("Integridad del sistema: 100%")
print("Fases completadas: 9/9")

}

else if(command==="2"){

print("FASES DEL PROYECTO")

print("1 Custodia")
print("2 Dominio")
print("3 Estrategia")
print("4 Expansión")
print("5 Consolidación")
print("6 Arquitectura")
print("7 Núcleo")
print("8 Proyección")
print("9 Ascenso")

}

else if(command==="3"){

print("RADAR DEL NÚCLEO ACTIVO")
print("Detectando nodos...")
print("Nodo central: ONLINE")
print("Sistema estable")

}

else if(command==="4"){

print("MAPA ESTRUCTURAL")
print("Base -> Núcleo -> Expansión -> Proyección")

}

else if(command==="5"){

print("ARCHIVO DEL NÚCLEO")
print("Sistema basado en disciplina, estrategia y estructura.")
print("El núcleo coordina todas las fases.")

}

else if(command==="6"){

output.innerHTML=""

}

else if(command==="7"){

window.location="index.html"

}

else{

print("Comando no reconocido")

}

cmd.value=""

}

})

</script>

</body>
</html>
