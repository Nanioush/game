```html
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>SISTEMA NÚCLEO</title>

<style>

body{
background:#050505;
color:#00ffa6;
font-family:monospace;
margin:0;
padding:0;
}

#boot{
padding:40px;
white-space:pre-line;
font-size:14px;
}

#terminal{
display:none;
padding:25px;
}

#terminal-output{
height:60vh;
overflow-y:auto;
border:1px solid #00ffa6;
padding:20px;
margin-bottom:10px;
background:#000;
}

#cmd{
width:100%;
padding:12px;
background:#000;
border:1px solid #00ffa6;
color:#00ffa6;
font-family:monospace;
}

#cmd:focus{
outline:none;
}

.title{
font-size:22px;
margin-bottom:15px;
letter-spacing:2px;
}

</style>

</head>

<body>

<div id="boot"></div>

<div id="terminal">

<div class="title">
SISTEMA CENTRAL — NÚCLEO
</div>

<div id="terminal-output"></div>

<input id="cmd" placeholder="introducir comando">

</div>

<script>

const boot = document.getElementById("boot")
const terminal = document.getElementById("terminal")
const output = document.getElementById("terminal-output")
const cmd = document.getElementById("cmd")

/* ----------- MIEMBROS DEL SISTEMA ----------- */

const miembros = [

{
id:"001",
nombre:"Yerover",
edad:21,
fase:"3 — Dominio",
estado:"Activo"
}

]

/* ----------- FASES ----------- */

const fases = [

"1 — Custodia",
"2 — Estrategia",
"3 — Dominio",
"4 — Expansión",
"5 — Consolidación",
"6 — Arquitectura",
"7 — Núcleo",
"8 — Proyección",
"9 — Ascenso"

]

/* ----------- ARRANQUE DEL SISTEMA ----------- */

const bootLines = [

"Iniciando sistema del Núcleo...",
"Verificando arquitectura...",
"Cargando módulos estratégicos...",
"Activando radar del sistema...",
"Verificando estructura de fases...",
"",
"FASE 1 — Custodia ✔",
"FASE 2 — Estrategia ✔",
"FASE 3 — Dominio ✔",
"FASE 4 — Expansión ✔",
"FASE 5 — Consolidación ✔",
"FASE 6 — Arquitectura ✔",
"FASE 7 — Núcleo ✔",
"FASE 8 — Proyección ✔",
"FASE 9 — Ascenso ✔",
"",
"Conectando nodos...",
"Sincronizando sistema...",
"",
"ACCESO AUTORIZADO",
"",
"Bienvenido al Núcleo."

]

let i = 0

function bootSequence(){

if(i < bootLines.length){

boot.innerHTML += bootLines[i] + "\n"

i++

setTimeout(bootSequence,400)

}

else{

setTimeout(()=>{

boot.style.display="none"
terminal.style.display="block"

startTerminal()

},800)

}

}

bootSequence()

/* ----------- TERMINAL ----------- */

function print(text){

let line=document.createElement("div")

line.innerText=text

output.appendChild(line)

output.scrollTop=output.scrollHeight

}

function startTerminal(){

print("Sistema listo.")
print("")
print("COMANDOS DISPONIBLES")
print("")
print("1 — Estado del sistema")
print("2 — Ver fases")
print("3 — Radar del núcleo")
print("4 — Mapa estructural")
print("5 — Archivo del núcleo")
print("6 — Limpiar terminal")
print("7 — Salir")
print("8 — Ver miembros")
print("")

}

cmd.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let command = cmd.value

print("> "+command)

/* ESTADO DEL SISTEMA */

if(command==="1"){

print("ESTADO DEL SISTEMA")
print("Nodo central: activo")
print("Integridad del sistema: 100%")
print("Miembros registrados: "+miembros.length)

}

/* FASES */

else if(command==="2"){

print("FASES DEL SISTEMA")
print("")

fases.forEach(f=>{
print(f)
})

}

/* RADAR */

else if(command==="3"){

print("RADAR DEL NÚCLEO ACTIVO")
print("Nodos detectados: "+miembros.length)
print("Sistema estable")

}

/* MAPA */

else if(command==="4"){

print("MAPA DEL SISTEMA")
print("Base → Núcleo → Expansión → Proyección")

}

/* ARCHIVO */

else if(command==="5"){

print("ARCHIVO DEL NÚCLEO")
print("Sistema basado en disciplina, estrategia y evolución progresiva.")

}

/* LIMPIAR */

else if(command==="6"){

output.innerHTML=""

}

/* SALIR */

else if(command==="7"){

window.location="index.html"

}

/* VER MIEMBROS */

else if(command==="8"){

print("MIEMBROS DEL NÚCLEO")
print("")

miembros.forEach(m=>{

print("MIEMBRO "+m.id)
print("Nombre: "+m.nombre)
print("Edad: "+m.edad)
print("Fase actual: "+m.fase)
print("Estado: "+m.estado)
print("")

})

}

/* COMANDO DESCONOCIDO */

else{

print("Comando no reconocido")

}

cmd.value=""

}

})

</script>

</body>

</html>
